<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CS2 Market Radar</title>
<style>
  :root{--bg:#0f1116;--card:#171a21;--card2:#1f242e;--bd:#2a313d;--tx:#e6e8eb;--mut:#8a93a3;--acc:#4ea1ff;--good:#34d399;--bad:#f87171;--warn:#f59e0b;--hot:#c084fc;--radius:10px}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--tx);font:14px/1.5 -apple-system,Segoe UI,Roboto,Arial,sans-serif}
  .wrap{max-width:1500px;margin:0 auto;padding:22px}
  h1{font-size:22px;margin:0 0 2px}
  .sub{color:var(--mut);font-size:12px;margin:0 0 16px}
  input,select,button{font:inherit;font-size:13px;height:34px;border-radius:var(--radius);border:1px solid var(--bd);background:var(--card2);color:var(--tx);padding:0 10px}
  button{cursor:pointer}
  button:hover{border-color:var(--acc)}
  button.on{background:var(--acc);color:#0b0e13;border-color:var(--acc);font-weight:600}
  .row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:10px}
  .seg{display:flex;gap:0;border:1px solid var(--bd);border-radius:var(--radius);overflow:hidden}
  .seg button{border:0;border-radius:0;height:32px}
  .seg button+button{border-left:1px solid var(--bd)}
  .kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin:6px 0 14px}
  .kpi{background:var(--card);border:1px solid var(--bd);border-radius:12px;padding:12px 14px}
  .kpi .l{font-size:12px;color:var(--mut)}
  .kpi .v{font-size:22px;font-weight:700;margin-top:2px}
  .tblwrap{border:1px solid var(--bd);border-radius:12px;overflow:auto;max-height:74vh;background:var(--card)}
  table{width:100%;border-collapse:collapse;font-size:12px;white-space:nowrap}
  th,td{padding:7px 10px;border-bottom:1px solid var(--bd);text-align:right}
  th:nth-child(1),td:nth-child(1),th.l,td.l{text-align:left}
  thead th{position:sticky;top:0;background:var(--card2);z-index:1;cursor:pointer;user-select:none;color:var(--mut);font-weight:600}
  thead th:hover{color:var(--tx)}
  thead th.sorted{color:var(--tx)}
  thead th.nosort{cursor:default}
  thead th.nosort:hover{color:var(--mut)}
  thead th .sar{color:var(--acc);font-size:11px;margin-left:2px}
  thead th .pr{color:var(--mut);font-size:9px;font-weight:700;vertical-align:super;margin-left:1px}
  .ic{cursor:help;color:var(--mut);font-size:11px;font-weight:400;margin-left:3px}
  .ic:hover{color:var(--acc)}
  .tip{position:fixed;z-index:100;max-width:280px;background:var(--card2);border:1px solid var(--bd);color:var(--tx);font-size:11px;font-weight:400;line-height:1.5;white-space:normal;padding:8px 10px;border-radius:8px;box-shadow:0 6px 20px rgba(0,0,0,.45);pointer-events:none;display:none}
  tbody tr:hover{background:var(--card2)}
  a{color:var(--acc);text-decoration:none}
  a.mut{color:var(--mut);font-size:11px}
  .pos{color:var(--good)} .neg{color:var(--bad)}
  .badge{display:inline-block;font-size:10px;font-weight:700;padding:1px 6px;border-radius:999px;margin-left:4px;vertical-align:middle}
  .b-trade{background:rgba(52,211,153,.15);color:var(--good)}
  .b-supply{background:rgba(248,113,113,.15);color:var(--bad)}
  .b-price{background:rgba(245,158,11,.15);color:var(--warn)}
  .b-hot{background:rgba(192,132,252,.15);color:var(--hot)}
  .anom{background:rgba(78,161,255,.06)}
  .foot{color:var(--mut);font-size:11px;margin-top:10px;line-height:1.6}
  label.ck{display:flex;align-items:center;gap:6px;color:var(--mut);font-size:13px;cursor:pointer}
</style>
</head>
<body>
<div class="wrap">
  <h1>CS2 Market Radar</h1>
  <div class="sub" id="meta-line">998 позиций активного рынка · день 2026-07-23 · обновлено 23.07.2026 16:15</div>

  <div class="row">
    <span style="color:var(--mut);font-size:12px">Период:</span>
    <div class="seg" id="period-seg">
      <button data-p="1" class="on">24ч</button><button data-p="3">3д</button><button data-p="7">7д</button><button data-p="30">30д</button>
    </div>
    <select id="preset">
      <option value="trade">Аномалии сделок (индекс ↓)</option>
      <option value="supply">Обвал лотов ↓</option>
      <option value="pricejump">Скачок цены ↓</option>
      <option value="hot">Взлёт популярности ↓</option>
      <option value="trades">Больше всего сделок ↓</option>
      <option value="turnover">Оборот ↓</option>
    </select>
    <label class="ck"><input type="checkbox" id="only-anom" /> только аномалии</label>
    <button id="btn-refresh" style="margin-left:auto">Собрать заново ↗</button>
  </div>

  <div class="row">
    <input id="search" type="text" placeholder="Поиск по названию" style="flex:1;min-width:160px" />
    <select id="f-cat"><option value="">Все категории</option></select>
    <select id="f-rar"><option value="">Все редкости</option></select>
    <select id="f-var"><option value="">Все износы/финиши</option></select>
    <select id="f-qual"><option value="">Все качества</option></select>
  </div>

  <div class="kpis" id="kpis"></div>

  <div class="tblwrap">
    <table>
      <thead><tr id="head"></tr></thead>
      <tbody id="body"></tbody>
    </table>
  </div>

  <div class="foot" id="foot"></div>
</div>

// ---- пороги аномалий (подобраны эмпирически, меняются здесь) ----
const TH = { trade: 3, supply: -50, price: 15, hot: 200 };

const fmt = (n) => n==null?'—':Math.round(n).toLocaleString('ru-RU');
const fmt1 = (n) => n==null?'—':(Math.round(n*10)/10).toLocaleString('ru-RU');
const pct = (n) => n==null?'—':(n>=0?'+':'')+ (Math.round(n*10)/10) +'%';
const clsSign = (n) => n==null?'':(n>0?'pos':(n<0?'neg':''));

// индекс аномалии сделок: сегодня vs средние за 30д
function tradeIndex(r){ const avg = Math.max((r.trades30||0)/30, 0.5); return (r.trades1||0)/avg; }

const ALL = DATA.rows.map(r => ({...r, variant: r.exterior || r.finish || '', _idx: tradeIndex(r)}));

let period = 1;

const el = id => document.getElementById(id);
const opts = (sel, vals, keepAll) => {
  const prev = sel.value;
  const all = sel.options[0].outerHTML;
  sel.innerHTML = all;
  [...new Set(vals.filter(Boolean))].sort((a,b)=>a.localeCompare(b)).forEach(v=>{ const o=document.createElement('option'); o.value=v;o.textContent=v; sel.appendChild(o); });
  sel.value = [...sel.options].some(o=>o.value===prev) ? prev : '';
};

// Умный поиск: запрос разбивается на слова, каждое слово должно встречаться в названии
// (порядок и разделители «-», «|», «(» не важны). Пусто → совпадает всё.
function matchSearch(name){
  const toks = el('search').value.toLowerCase().split(/\s+/).filter(Boolean);
  if(!toks.length) return true;
  const hay = name.toLowerCase();
  return toks.every(t => hay.includes(t));
}

// каскад: опции каждого фильтра считаются по строкам, прошедшим ОСТАЛЬНЫЕ фильтры
function activeFilters(except){
  const cat = el('f-cat').value, rar = el('f-rar').value, vr = el('f-var').value, qu = el('f-qual').value;
  return ALL.filter(r =>
    (except==='search' || matchSearch(r.name)) &&
    (except==='cat' || !cat || r.category===cat) &&
    (except==='rar' || !rar || r.rarity===rar) &&
    (except==='var' || !vr || r.variant===vr) &&
    (except==='qual' || !qu || r.quality===qu)
  );
}
function refreshFilterOptions(){
  opts(el('f-cat'), activeFilters('cat').map(r=>r.category));
  opts(el('f-rar'), activeFilters('rar').map(r=>r.rarity));
  opts(el('f-var'), activeFilters('var').map(r=>r.variant));
  opts(el('f-qual'), activeFilters('qual').map(r=>r.quality));
}

const P = {
  1:  {price:'priceDiff1', supply:'sellRate1', trades:'trades1', turn:'turnover1'},
  3:  {price:'priceDiff3', supply:'sellRate3', trades:'trades3', turn:'turnover7'},
  7:  {price:'priceDiff7', supply:'sellRate7', trades:'trades7', turn:'turnover7'},
  30: {price:'priceDiff30',supply:'sellRate30',trades:'trades30',turn:'turnover30'},
};

const COLS = () => {
  const p = P[period];
  return [
    {k:'name', sid:'name', t:'Предмет', l:true, get:r=>r.name},
    {k:'category', sid:'category', t:'Категория', l:true, nosort:true, get:r=>r.category},
    {k:'rarity', sid:'rarity', t:'Редкость', l:true, nosort:true, get:r=>r.rarity},
    {k:'variant', sid:'variant', t:'Износ/финиш', l:true, nosort:true, get:r=>r.variant||'—'},
    {k:'price', sid:'price', t:'Цена ¥', get:r=>r.price, fmt:fmt1, info:'Текущая минимальная цена продажи среди площадок, в юанях (¥).'},
    {k:p.price, sid:'pdiff', t:'Δцена', get:r=>r[p.price], fmt:pct, sign:true, info:'Изменение цены за выбранный период (24ч/3д/7д/30д), в процентах.'},
    {k:'supply', sid:'supply', t:'Лоты', get:r=>r.sellNums, fmt:fmt, info:'Сколько лотов сейчас выставлено на продажу.'},
    {k:p.supply, sid:'sdiff', t:'Δлоты', get:r=>r[p.supply], fmt:pct, sign:true, info:'Изменение числа лотов за период: минус — предложение сократилось, плюс — выросло.'},
    {k:p.trades, sid:'trades', t:'Сделок', get:r=>r[p.trades], fmt:fmt, info:'Число сделок (продаж) за выбранный период.'},
    {k:'_idx', sid:'idx', t:'Индекс', get:r=>r._idx, fmt:fmt1, info:'Индекс всплеска спроса: сделки сегодня ÷ среднесуточные за 30 дней. Значение ≥3 — аномальный спрос.'},
    {k:p.turn, sid:'turn', t:'Оборот ¥', get:r=>r[p.turn], fmt:fmt, info:'Оборот в деньгах за период: сумма всех сделок, в юанях (¥).'},
    {k:'hotRankChange', sid:'hot', t:'Δпопул.', get:r=>r.hotRankChange, fmt:fmt, sign:true, info:'Изменение места в рейтинге популярности: на сколько позиций предмет поднялся (плюс) или опустился (минус).'},
  ];
};

// Мультиколоночная сортировка: упорядоченный список {sid, dir}. dir:1 — по возрастанию, -1 — по убыванию.
// Клик по столбцу: нет в списке → добавить (возрастание) · есть по возрастанию → убывание · есть по убыванию → убрать.
// Пока ручной сортировки нет (sortSpec пуст) — правит выбранный пресет. Первый ручной клик начинает сортировку с нуля.
let sortSpec = [];
const PRESET_MAP = {trade:['idx',-1], supply:['sdiff',1], pricejump:['pdiff',-1], hot:['hot',-1], trades:['trades',-1], turnover:['turn',-1]};
function presetSort(){ const e = PRESET_MAP[el('preset').value] || ['idx',-1]; return [{sid:e[0], dir:e[1]}]; }
const effectiveSort = () => sortSpec.length ? sortSpec : presetSort();

function anomalies(r){
  const p=P[period]; const out=[];
  if(r._idx>=TH.trade) out.push('trade');
  if((r[p.supply]??0)<=TH.supply) out.push('supply');
  if(Math.abs(r[p.price]??0)>=TH.price) out.push('price');
  if((r.hotRankChange??0)>=TH.hot) out.push('hot');
  return out;
}

function currentRows(){
  let rows = activeFilters(null);
  if(el('only-anom').checked) rows = rows.filter(r=>anomalies(r).length);
  const getters={}; for(const c of COLS()) getters[c.sid]=c.get;
  const spec = effectiveSort().filter(s=>getters[s.sid]);
  rows.sort((a,b)=>{
    for(const {sid,dir} of spec){
      const g=getters[sid]; const av=g(a), bv=g(b);
      const am = av==null || av==='' || (typeof av==='number' && Number.isNaN(av));
      const bm = bv==null || bv==='' || (typeof bv==='number' && Number.isNaN(bv));
      if(am || bm){ if(am && bm) continue; return am ? 1 : -1; }  // пустые всегда в конце
      if(typeof av==='string' || typeof bv==='string'){
        const c=(''+av).localeCompare(''+bv,'ru'); if(c) return c*dir; continue;
      }
      if(av<bv) return -1*dir; if(av>bv) return 1*dir;
    }
    return 0;
  });
  return rows;
}

// Выбор пресета сбрасывает ручную комбинацию — дальше сортировкой правит пресет.
function applyPreset(){ sortSpec = []; }

function renderKpis(rows){
  const p=P[period];
  const k=[
    ['Позиций', rows.length],
    ['Аномалии сделок', rows.filter(r=>r._idx>=TH.trade).length],
    ['Обвал лотов', rows.filter(r=>(r[p.supply]??0)<=TH.supply).length],
    ['Скачок цены', rows.filter(r=>Math.abs(r[p.price]??0)>=TH.price).length],
    ['Взлёт популярности', rows.filter(r=>(r.hotRankChange??0)>=TH.hot).length],
  ];
  el('kpis').innerHTML = k.map(([l,v])=>`<div class="kpi"><div class="l">${l}</div><div class="v">${v.toLocaleString('ru-RU')}</div></div>`).join('');
}

function render(){
  const cols=COLS(), rows=currentRows();
  const es = effectiveSort();
  el('head').innerHTML = cols.map(c=>{
    const info = c.info ? ` <span class="ic" data-tip="${c.info.replace(/"/g,'&quot;')}">ⓘ</span>` : '';
    if(c.nosort) return `<th class="${c.l?'l':''} nosort">${c.t}${info}</th>`;
    const i = es.findIndex(s=>s.sid===c.sid);
    let ind='';
    if(i>=0){
      const arrow = es[i].dir<0 ? '▼' : '▲';
      const prio = es.length>1 ? `<span class="pr">${i+1}</span>` : '';
      ind = ` <span class="sar">${arrow}</span>${prio}`;
    }
    return `<th class="${c.l?'l':''}${i>=0?' sorted':''}" data-sid="${c.sid}">${c.t}${info}${ind}</th>`;
  }).join('');
  el('body').innerHTML = rows.map(r=>{
    const an=anomalies(r);
    const badges = an.map(a=>({trade:'<span class="badge b-trade">спрос</span>',supply:'<span class="badge b-supply">лоты</span>',price:'<span class="badge b-price">цена</span>',hot:'<span class="badge b-hot">хайп</span>'}[a])).join('');
    return `<tr class="${an.length?'anom':''}">`+cols.map(c=>{
      let v=c.get(r); v=c.fmt?c.fmt(v):(v??'—');
      const cls=c.sign?clsSign(c.get(r)):'';
      if(c.k==='name') return `<td class="l"><a href="https://www.steamdt.com/en/cs2/${encodeURIComponent(r.name)}?tab=trend&type=charts" target="_blank" rel="noopener">${r.name}</a>${badges}</td>`;
      return `<td class="${c.l?'l':''} ${cls}">${v}</td>`;
    }).join('')+`</tr>`;
  }).join('');
  renderKpis(rows);
  el('foot').textContent = `Индекс сделок = сделки сегодня ÷ средние за 30д (порог аномалии ≥${TH.trade}×). Обвал лотов ≤${TH.supply}%, скачок цены ≥${TH.price}%, взлёт популярности ≥${TH.hot} мест. Данные SteamDT, цены в юанях (¥). Клик по заголовку: 1-й — по возрастанию (▲), 2-й — по убыванию (▼), 3-й — снять. Клики по разным столбцам комбинируются (цифра — приоритет: сначала 1, потом 2…); пресет из списка заменяет ручную сортировку.`;
}

// события
el('period-seg').addEventListener('click', e=>{ const b=e.target.closest('button'); if(!b)return; period=+b.dataset.p; [...e.currentTarget.children].forEach(x=>x.classList.toggle('on',x===b)); render(); });
el('preset').addEventListener('change', ()=>{ applyPreset(); render(); });
el('only-anom').addEventListener('change', render);
el('search').addEventListener('input', ()=>{ refreshFilterOptions(); render(); });
for(const f of ['f-cat','f-rar','f-var','f-qual']) el(f).addEventListener('change', ()=>{ refreshFilterOptions(); render(); });
document.addEventListener('click', e=>{
  if(e.target.closest('.ic')) return;             // клик по инфо-иконке не сортирует
  const th=e.target.closest('#head th'); if(!th)return;
  const sid=th.dataset.sid; if(!sid)return;
  const i = sortSpec.findIndex(s=>s.sid===sid);
  if(i<0) sortSpec.push({sid, dir:1});               // 1-й клик — по возрастанию (добавляем как след. ключ)
  else if(sortSpec[i].dir===1) sortSpec[i].dir=-1;   // 2-й клик — по убыванию
  else sortSpec.splice(i,1);                          // 3-й клик — убрать столбец из сортировки
  el('preset').selectedIndex = -1;                   // ручная сортировка — снимаем выделение пресета
  render();
});

// кнопка «Собрать заново»
(function(){
  const SERVER = location.protocol.startsWith('http');
  const btn=el('btn-refresh');
  if(!SERVER){ btn.textContent='Открыть панель для сбора'; }
  btn.addEventListener('click', async ()=>{
    if(!SERVER){ alert('Запустите локальную панель: node server.mjs (или «Открыть панель.bat»), затем жмите кнопку там.'); return; }
    btn.disabled=true; btn.textContent='Собираю…';
    try{
      await fetch('/api/rebuild',{method:'POST'});
      while(true){ await new Promise(r=>setTimeout(r,2500)); let s; try{ s=await (await fetch('/api/status')).json(); }catch{ continue; }
        if(s.error){ btn.textContent='Ошибка: '+s.error; btn.disabled=false; return; }
        if(!s.running && s.stage==='done'){ location.reload(); return; }
        btn.textContent = `Сбор: ${s.done||0}${s.total?'/'+s.total:''}`;
      }
    }catch(e){ btn.textContent='Сервер недоступен'; btn.disabled=false; }
  });
})();

// тултип инфо-иконок (position:fixed на body — не обрезается прокруткой таблицы)
const tipEl = document.createElement('div'); tipEl.className='tip'; document.body.appendChild(tipEl);
function placeTip(ic){
  tipEl.textContent = ic.dataset.tip; tipEl.style.display='block';
  const r=ic.getBoundingClientRect(), t=tipEl.getBoundingClientRect();
  let left=Math.max(8, Math.min(r.left + r.width/2 - t.width/2, innerWidth - t.width - 8));
  let top=r.bottom+6; if(top + t.height > innerHeight-8) top=r.top - t.height - 6;
  tipEl.style.left=left+'px'; tipEl.style.top=top+'px';
}
document.addEventListener('mouseover', e=>{ const ic=e.target.closest('.ic'); if(ic) placeTip(ic); });
document.addEventListener('mouseout', e=>{ if(e.target.closest('.ic')) tipEl.style.display='none'; });

// старт
refreshFilterOptions();
applyPreset();
render();
</script>
</body>
</html>
